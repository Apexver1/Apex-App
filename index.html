window.reqIncrease=function(){
  var amt=parseFloat(document.getElementById("reqAmt").value);
  var reason=document.getElementById("reqReason").value;
  if(!amt||amt<=0){alert("Enter valid amount");return;}
  if(!reason.trim()){alert("Enter reason");return;}
  api("/rest/v1/nil_budget_requests",{method:"POST",body:JSON.stringify({season:budget.season,requested_amount:amt,reason:reason,requested_by:UID,status:"pending"}),prefer:"return=minimal"}).then(function(){
    loadData().then(function(){closeM();render();});
  });
}

window.openReqModal=function(){
  var h='<div class="mbg" onclick="if(event.target===this)closeM()"><div class="mdl">';
  h+='<button class="x" onclick="closeM()">✕</button>';
  h+='<h2 style="font-size:18px;margin-bottom:12px">REQUEST BUDGET INCREASE</h2>';
  h+='<label style="font-size:10px;color:var(--dim);letter-spacing:1px">AMOUNT (USD)</label>';
  h+='<input id="reqAmt" type="number" class="inp" placeholder="500000">';
  h+='<label style="font-size:10px;color:var(--dim);letter-spacing:1px">REASON</label>';

  h+='<button class="btn" onclick="reqIncrease()">SUBMIT REQUEST</button>';
  h+='</div></div>';
  document.getElementById("mc").innerHTML=h;
}

window.decideReq=function(reqId,decision){
  var notes=prompt(decision.toUpperCase()+" notes (optional):")||"";
  var body={status:decision,approved_by:UID,approved_at:new Date().toISOString(),decision_notes:notes};
  api("/rest/v1/nil_budget_requests?id=eq."+reqId,{method:"PATCH",body:JSON.stringify(body),prefer:"return=minimal"}).then(function(){
    if(decision==="approved"){
      var req=bRequests.filter(function(r){return r.id===reqId;})[0];
      if(req){
        var newTotal=parseFloat(budget.total_budget)+parseFloat(req.requested_amount);
        return api("/rest/v1/nil_budget?id=eq."+budget.id,{method:"PATCH",body:JSON.stringify({total_budget:newTotal}),prefer:"return=minimal"});
      }
    }
  }).then(function(){loadData().then(function(){render();});});
}


window.calcComposite=function(s,w){return Math.round((s.shooting_score*w.shooting+s.defense_score*w.defense+s.iq_score*w.iq+s.fit_score*w.fit)*10)/10;}
window.getWeights=function(preset,custom){
  if(preset==="equal")return{shooting:0.25,defense:0.25,iq:0.25,fit:0.25};
  if(preset==="production")return{shooting:0.4,defense:0.25,iq:0.2,fit:0.15};
  if(preset==="fit")return{shooting:0.2,defense:0.2,iq:0.2,fit:0.4};
  return custom||{shooting:0.25,defense:0.25,iq:0.25,fit:0.25};
}
window.openScore=function(pid){
  var existing=scoresMap[pid]||{shooting_score:5,defense_score:5,iq_score:5,fit_score:5,weighting_preset:"equal",notes:""};
  var p=prospects.filter(function(x){return x.id===pid;})[0];if(!p)return;
  var h='<div class="mbg" onclick="if(event.target===this)closeM()"><div class="mdl">';
  h+='<button class="x" onclick="closeM()">✕</button>';
  h+='<h2 style="font-size:18px;margin-bottom:4px">SCORE: '+p.player_name+'</h2>';
  h+='<div style="font-size:11px;color:var(--dim);margin-bottom:12px">Rate 1-10 on each dimension</div>';
  ["shooting","defense","iq","fit"].forEach(function(k){
    var label=k.toUpperCase();
    h+='<div style="margin-bottom:10px"><label style="font-size:10px;color:var(--dim);letter-spacing:1px">'+label+' <span id="lbl-'+k+'" style="color:var(--y);font-weight:700;float:right">'+existing[k+"_score"]+'</span></label><input id="sc-'+k+'" type="range" min="1" max="10" step="0.5" value="'+existing[k+"_score"]+'" oninput="document.getElementById(\'lbl-'+k+'\').textContent=this.value" style="width:100%;accent-color:var(--y)"></div>';
  });
  h+='<label style="font-size:10px;color:var(--dim);letter-spacing:1px">WEIGHTING</label>';
  h+='<select id="sc-preset" class="inp"><option value="equal"'+(existing.weighting_preset==="equal"?" selected":"")+'>Equal (25/25/25/25)</option><option value="production"'+(existing.weighting_preset==="production"?" selected":"")+'>Production (40/25/20/15)</option><option value="fit"'+(existing.weighting_preset==="fit"?" selected":"")+'>Fit-heavy (20/20/20/40)</option></select>';
  h+='<textarea id="sc-notes" class="inp" rows="2" placeholder="Notes...">'+(existing.notes||"")+'</textarea>';
  h+='<button class="btn" onclick="saveScore(\''+pid+'\')">SAVE SCORE</button>';
  h+='</div></div>';
  document.getElementById("mc").innerHTML=h;
}
window.saveScore=function(pid){
  var s={prospect_id:pid,scored_by:UID,shooting_score:parseFloat(document.getElementById("sc-shooting").value),defense_score:parseFloat(document.getElementById("sc-defense").value),iq_score:parseFloat(document.getElementById("sc-iq").value),fit_score:parseFloat(document.getElementById("sc-fit").value),weighting_preset:document.getElementById("sc-preset").value,notes:document.getElementById("sc-notes").value};
  var w=getWeights(s.weighting_preset);
  s.composite_score=calcComposite(s,w);
  api("/rest/v1/prospect_scores?on_conflict=prospect_id,scored_by",{method:"POST",body:JSON.stringify(s),prefer:"return=minimal,resolution=merge-duplicates"}).then(function(){
    scoresMap[pid]=s;closeM();render();
  });
}


window.valueNil=function(p,ps){
  var ppg=(ps&&ps.ppg)||p.ppg||0;
  var pos=p.position||"";
  var cls=p["class_year"]||"FR";
  var schools=p.competing_schools?p.competing_schools.split(",").length:0;
  var base=ppg*80000;
  var posPrem=pos==="C"?200000:pos==="PG"?100000:0;
  var yrsLeft=cls==="SR"?1:cls==="JR"?2:cls==="SO"?3:4;
  var yrsPrem=yrsLeft*150000;
  var demandPrem=schools*100000;
  var confMult=1.0;
  if(p.current_conference){
    var cn=p.current_conference.toLowerCase();
    if(cn.indexOf("big ten")>=0||cn.indexOf("sec")>=0||cn.indexOf("big 12")>=0||cn.indexOf("acc")>=0)confMult=1.0;
    else if(cn.indexOf("big east")>=0||cn.indexOf("pac")>=0||cn.indexOf("mountain")>=0||cn.indexOf("aac")>=0)confMult=0.75;
    else confMult=0.5;
  }
  var total=Math.round((base+posPrem+yrsPrem+demandPrem)*confMult);
  var lo=Math.round(total*0.75);
  var hi=Math.round(total*1.25);
  var label=total>=1500000?"Franchise":total>=800000?"Starter":total>=400000?"6th Man":total>=150000?"Rotation":"Bench";
  return{mid:total,lo:lo,hi:hi,name:label,n:total>=1500000?1:total>=800000?2:total>=400000?3:total>=150000?4:5,base:base,posPrem:posPrem,yrsPrem:yrsPrem,demandPrem:demandPrem,confMult:confMult,yrsLeft:yrsLeft};
}
window.tier=function(ppg){return valueNil({ppg:ppg,position:"",class_year:"FR",competing_schools:""},{});}

window.openSlot=function(slotNum){
  var all=[];
  roster.forEach(function(p){all.push({id:p.id,name:p.player_name,pos:p.position,ppg:p.ppg,src:"ROSTER",color:"var(--bright)",raw:p});});
  prospects.forEach(function(p){var ps=pStats[p.player_name]||{};all.push({id:p.id,name:p.player_name,pos:p.position,ppg:ps.ppg||p.ppg,src:p.source==="portal"?"PORTAL":"HS",color:p.source==="portal"?"var(--y)":"var(--gold)",raw:p});});
  if(pickerSearch)all=all.filter(function(p){return p.name.toLowerCase().indexOf(pickerSearch.toLowerCase())>=0;});
  if(pickerPos!=="ALL")all=all.filter(function(p){return p.pos===pickerPos;});
  var h='<div class="mbg" onclick="if(event.target===this)closeM()"><div class="mdl">';
  h+='<button class="x" onclick="closeM()">✕</button>';
  h+='<h2 style="font-size:18px;margin-bottom:4px">SLOT '+slotNum+(slotNum<=10?" · NIL":" · NO NIL")+'</h2>';
  h+='<div style="font-size:11px;color:var(--dim);margin-bottom:12px">All players · tap to commit</div>';
  h+='<input class="inp" placeholder="Search by name..." value="'+pickerSearch+'" oninput="pickerSearch=this.value;openSlot('+slotNum+')">';
  h+='<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">';
  ["ALL","PG","SG","SF","PF","C"].forEach(function(p){h+='<button class="fb'+(pickerPos===p?" a":"")+'" onclick="pickerPos=\''+p+'\';openSlot('+slotNum+')">'+p+'</button>';});
  h+='</div>';
  h+='<div style="font-size:10px;color:var(--dim);margin-bottom:8px">'+all.length+' players</div>';
  all.forEach(function(p){
    var t=valueNil(p.raw,pStats[p.name]||{});
    h+='<div class="card" style="cursor:pointer" onclick="commitP(\''+p.id+'\','+slotNum+','+t.mid+')">';
    h+='<div style="display:flex;justify-content:space-between"><div><div style="font-size:14px;font-weight:700">'+p.name+'</div><div style="font-size:10px;color:var(--dim)"><span style="color:'+p.color+';font-weight:700">'+p.src+'</span> · '+(p.pos||"")+' · '+(p.ppg||"--")+' ppg</div></div>';
    h+='<div style="text-align:right"><div style="font-size:11px;color:var(--y);font-weight:700">T'+t.n+' '+t.name+'</div><div style="font-size:13px;font-weight:700;color:var(--green);font-family:Bebas Neue">$'+(t.mid/1000).toFixed(0)+'K</div></div></div></div>';
  });
  h+='</div></div>';
  document.getElementById("mc").innerHTML=h;
}

window.commitP=function(pid,slot,nil){
  pickerSearch="";pickerPos="ALL";
  openNilEdit(pid,slot,nil);
}
window.openNilEdit=function(pid,slot,suggestedNil){
  var allP={};prospects.forEach(function(p){allP[p.id]=p;});roster.forEach(function(p){allP[p.id]=p;});
  var p=allP[pid];if(!p)return;
  var ps=pStats[p.player_name]||{};
  var t=tier(ps.ppg||p.ppg||0);
  var existing=(budget.per_player_allocations_json&&budget.per_player_allocations_json.by_player&&budget.per_player_allocations_json.by_player["slot_"+slot])||null;
  var currentNil=existing?existing.nil:suggestedNil;
  var h='<div class="mbg" onclick="if(event.target===this)closeM()"><div class="mdl">';
  h+='<button class="x" onclick="closeM()">✕</button>';
  h+='<h2 style="font-size:18px;margin-bottom:4px">'+p.player_name+'</h2>';
  h+='<div style="font-size:11px;color:var(--dim);margin-bottom:12px">SLOT '+slot+' · '+(p.position||"")+' · T'+t.n+' '+t.name+'</div>';
  h+='<div style="font-size:11px;color:var(--y);margin-bottom:6px">SUGGESTED: $'+(t.mid/1000).toFixed(0)+'K (range $'+(t.lo/1000).toFixed(0)+'K-$'+(t.hi/1000).toFixed(0)+'K)</div>';
  h+='<label style="font-size:10px;color:var(--dim);letter-spacing:1px">NIL AMOUNT (USD)</label>';
  h+='<input id="nilAmt" type="number" class="inp" value="'+currentNil+'">';
  h+='<button class="btn" onclick="saveCommit(\''+pid+'\','+slot+')">'+(existing?"UPDATE":"COMMIT")+'</button>';
  h+='</div></div>';
  document.getElementById("mc").innerHTML=h;
}
window.saveCommit=function(pid,slot){
  var nil=parseFloat(document.getElementById("nilAmt").value)||0;
  var alloc=budget.per_player_allocations_json||{by_position:{},by_player:{}};
  if(!alloc.by_player)alloc.by_player={};
  alloc.by_player["slot_"+slot]={prospect_id:pid,nil:nil,slot:slot};
  var totalCommitted=0;
  Object.keys(alloc.by_player).forEach(function(k){totalCommitted+=alloc.by_player[k].nil||0;});
  api("/rest/v1/nil_budget?id=eq."+budget.id,{method:"PATCH",body:JSON.stringify({per_player_allocations_json:alloc,committed_amount:totalCommitted}),prefer:"return=minimal"}).then(function(){
    budget.per_player_allocations_json=alloc;
    budget.committed_amount=totalCommitted;
    budget.remaining_amount=parseFloat(budget.total_budget)-totalCommitted;
    closeM();render();
  });
}

window.removeSlot=function(slot){
  var alloc=budget.per_player_allocations_json||{};
  if(alloc.by_player&&alloc.by_player["slot_"+slot]){delete alloc.by_player["slot_"+slot];}
  var totalCommitted=0;
  Object.keys(alloc.by_player||{}).forEach(function(k){totalCommitted+=alloc.by_player[k].nil||0;});
  api("/rest/v1/nil_budget?id=eq."+budget.id,{method:"PATCH",body:JSON.stringify({per_player_allocations_json:alloc,committed_amount:totalCommitted}),prefer:"return=minimal"}).then(function(){
    budget.per_player_allocations_json=alloc;
    budget.committed_amount=totalCommitted;
    budget.remaining_amount=parseFloat(budget.total_budget)-totalCommitted;
    render();
  });
}


window.api=function(path,opt){
  opt=opt||{};
  return fetch(SU+path,{headers:{apikey:SK,Authorization:"Bearer "+T,"Content-Type":"application/json",Prefer:opt.prefer||""},method:opt.method||"GET",body:opt.body||undefined}).then(function(r){if(!r.ok)throw new Error(r.status);return r.text();}).then(function(t){return t?JSON.parse(t):null;});
}

window.doLogin=function(){
  var em=document.getElementById("em").value;
  var pw=document.getElementById("pw").value;
  document.getElementById("loginErr").textContent="";
  fetch(SU+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:SK,"Content-Type":"application/json"},body:JSON.stringify({email:em,password:pw})}).then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.error_description||"Login failed");});return r.json();}).then(function(d){
    T=d.access_token;
    document.getElementById("ue").textContent=d.user.email;
    document.getElementById("login").className="hide";
    document.getElementById("app").className="";
    return loadData();
  }).then(function(){render();}).catch(function(e){document.getElementById("loginErr").textContent=e.message;});
}
document.getElementById("pw").onkeydown=function(e){if(e.key==="Enter")doLogin();};

window.loadData=function(){
  return Promise.all([
    api("/rest/v1/my_roster?select=*&season=eq.2025-26&order=ppg.desc.nullslast"),
    api("/rest/v1/prospect_shortlist?select=*&is_seed_data=eq.true&order=nil_estimate.desc.nullslast"),
    api("/rest/v1/team_strategy?select=*&is_seed_data=eq.true&limit=1"),
    api("/rest/v1/scholarships?select=*&is_seed_data=eq.true&order=season.asc"),
    api("/rest/v1/prospect_stats?select=stat_name,stat_value,prospect_id&is_seed_data=eq.true"),
    api("/rest/v1/crm_log?select=*&order=contact_date.desc"),
api("/rest/v1/nil_budget?select=*&is_seed_data=eq.true&limit=1"),
api("/rest/v1/nil_budget_requests?select=*&order=requested_at.desc"),
api("/rest/v1/prospect_scores?select=*")
  ]).then(function(r){
    roster=r[0]||[];prospects=r[1]||[];strategy=(r[2]&&r[2][0])||null;schols=r[3]||[];
    var ps=r[4]||[];var logs=r[5]||[];budget=(r[6]&&r[6][0])||null;bRequests=r[7]||[];scoresMap={};(r[8]||[]).forEach(function(s){scoresMap[s.prospect_id]=s;});
    var idMap={};prospects.forEach(function(p){idMap[p.id]=p.player_name;});
    pStats={};ps.forEach(function(s){var n=idMap[s.prospect_id];if(n){if(!pStats[n])pStats[n]={};pStats[n][s.stat_name]=s.stat_value;}});
    crmLogs={};logs.forEach(function(l){if(!crmLogs[l.prospect_id])crmLogs[l.prospect_id]=[];crmLogs[l.prospect_id].push(l);});

        var t=tier(ps.ppg||0);
        var val=slot.nil<t.mid?'<span style="color:var(--green);font-size:9px">VALUE</span> ':'';
        h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:var(--dim)">SLOT '+i+'</div><div style="font-size:14px;font-weight:700">'+p.player_name+'</div><div style="font-size:10px;color:var(--dim)">'+p.position+' · T'+t.n+' '+t.name+' '+val+'</div></div><div style="text-align:right"><div style="font-size:14px;font-weight:700;color:var(--green);font-family:Bebas Neue">$'+(slot.nil/1000).toFixed(0)+'K</div><div style="display:flex;gap:4px;margin-top:4px"><button onclick="openNilEdit(\''+slot.prospect_id+'\','+i+','+slot.nil+')" style="background:none;border:1px solid var(--y);color:var(--y);font-size:9px;padding:3px 8px;border-radius:3px;cursor:pointer">EDIT</button><button onclick="removeSlot('+i+')" style="background:none;border:1px solid var(--red);color:var(--red);font-size:9px;padding:3px 8px;border-radius:3px;cursor:pointer">REMOVE</button></div></div></div></div>';
      } else {
        h+='<div class="card" style="cursor:pointer;border-style:dashed" onclick="openSlot('+i+')"><div style="text-align:center;color:var(--dim);font-size:12px">+ SLOT '+i+' · TAP TO ADD</div></div>';
      }
    }
    h+='<div style="font-size:10px;letter-spacing:2px;color:var(--dim);margin-top:16px;margin-bottom:8px">DEPTH/WALK-ON (Slots 11-15)</div>';
    for(var i=11;i<=15;i++){
      var slot=byPlayer["slot_"+i];
      if(slot){
        var p=allP[slot.prospect_id]||{player_name:"Unknown"};
        h+='<div class="card"><div style="display:flex;justify-content:space-between"><div><div style="font-size:11px;color:var(--dim)">SLOT '+i+'</div><div style="font-size:14px">'+p.player_name+'</div></div><button onclick="removeSlot('+i+')" style="background:none;border:1px solid var(--red);color:var(--red);font-size:9px;padding:3px 8px;border-radius:3px;cursor:pointer">REMOVE</button></div></div>';
      } else {
        h+='<div class="card" style="cursor:pointer;border-style:dashed" onclick="openSlot('+i+')"><div style="text-align:center;color:var(--dim);font-size:11px">+ SLOT '+i+'</div></div>';
      }
    }
    c.innerHTML=h;
  }

  if(tab==="bg"){
    if(!budget){c.innerHTML='<div class="card">No budget loaded</div>';return;}
    var alloc=budget.per_player_allocations_json||{};
    var byPos=alloc.by_position||{};
    var tot=parseFloat(budget.total_budget);
    var com=parseFloat(budget.committed_amount)||0;
    var rem=parseFloat(budget.remaining_amount)||tot;
    var pct=tot>0?(com/tot*100).toFixed(1):0;
    var pending=bRequests.filter(function(r){return r.status==="pending";});
    var history=bRequests.filter(function(r){return r.status!=="pending";});
    var h='';
    if(pending.length){
      h+='<div class="card" style="border-color:var(--gold)"><div style="font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:8px">PENDING REQUESTS ('+pending.length+')</div>';
      pending.forEach(function(r){
        h+='<div style="padding:8px 0;border-bottom:1px solid var(--b)"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--green);font-family:Bebas Neue">+$'+(parseFloat(r.requested_amount)/1000).toFixed(0)+'K</div><div style="font-size:11px;color:var(--bright);margin-top:2px">'+(r.reason||"")+'</div><div style="font-size:9px;color:var(--dim);margin-top:2px">'+new Date(r.requested_at).toLocaleString()+'</div></div><div style="display:flex;flex-direction:column;gap:4px"><button onclick="decideReq(\''+r.id+'\',\'approved\')" style="background:var(--green);color:#000;border:none;border-radius:3px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer">APPROVE</button><button onclick="decideReq(\''+r.id+'\',\'denied\')" style="background:none;border:1px solid var(--red);color:var(--red);border-radius:3px;padding:4px 10px;font-size:10px;cursor:pointer">DENY</button></div></div></div>';
      });
      h+='</div>';
    }
    h+='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
    h+='<div class="sb"><div class="l">Total Cap</div><div class="v">$'+(tot/1000000).toFixed(1)+'M</div><div class="s">2026-27</div></div>';
    var overBudget=com>tot;var comColor=overBudget?'var(--red)':'var(--white)';h+='<div class="sb"><div class="l">Committed</div><div class="v" style="color:'+comColor+'">$'+(com/1000000).toFixed(1)+'M</div><div class="s" style="color:'+(overBudget?'var(--red)':'var(--dim)')+'">'+pct+'% used'+(overBudget?' OVER':'')+'</div></div>';
    h+='<div class="sb"><div class="l">Remaining</div><div class="v">$'+(rem/1000000).toFixed(1)+'M</div><div class="s">available</div></div>';
    h+='</div>';
    h+='<div class="card"><div style="font-size:10px;letter-spacing:2px;color:var(--y);margin-bottom:12px">POSITION ALLOCATIONS</div>';
    Object.keys(byPos).forEach(function(pos){
      var p=byPos[pos];var a=p.allocated||0;var sp=p.spent||0;
      var pp=a>0?(sp/a*100).toFixed(0):0;
      var color=pp>90?"var(--red)":pp>70?"var(--gold)":"var(--green)";
      h+='<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:var(--bright)">'+pos.toUpperCase()+'</span><span style="font-size:11px;color:var(--dim)">$'+(sp/1000).toFixed(0)+'K / $'+(a/1000).toFixed(0)+'K</span></div>';
      h+='<div style="background:var(--bg);border-radius:4px;height:8px;overflow:hidden"><div style="background:'+color+';height:100%;width:'+pp+'%"></div></div>';
      h+='<div style="font-size:10px;color:var(--dim);margin-top:3px">'+(p.notes||"")+'</div></div>';
    });
    h+='</div>';
    h+='<button class="btn" style="margin-top:12px" onclick="openReqModal()">REQUEST BUDGET INCREASE</button>';
    if(history.length){
      h+='<div class="card" style="margin-top:12px"><div style="font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:8px">REQUEST HISTORY</div>';
      history.forEach(function(r){
        var col=r.status==="approved"?"var(--green)":"var(--red)";
        h+='<div style="padding:6px 0;border-bottom:1px solid var(--b);font-size:11px"><span style="color:'+col+';font-weight:700">'+r.status.toUpperCase()+'</span> · $'+(parseFloat(r.requested_amount)/1000).toFixed(0)+'K · <span style="color:var(--dim)">'+new Date(r.requested_at).toLocaleDateString()+'</span><div style="color:var(--bright);margin-top:2px">'+(r.reason||"")+'</div></div>';
      });
      h+='</div>';
    }
    c.innerHTML=h;
  }

  if(tab==="sf"){
    var res=portal.filter(function(p){var ps=pStats[p.player_name]||{};if(fP!=="ALL"&&p.position!==fP)return false;if(fPPG>0&&(!ps.ppg||ps.ppg<fPPG))return false;if(fRPG>0&&(!ps.rpg||ps.rpg<fRPG))return false;if(f3P>0&&(!ps.three_pct||ps.three_pct*100<f3P))return false;return true;});
    var h='<div class="card"><div style="font-size:10px;letter-spacing:2px;color:var(--y);margin-bottom:12px">SMART FILTER</div>';
    h+='<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">'+["ALL","PG","SG","SF","PF","C"].map(function(p){return '<button class="fb'+(fP===p?" a":"")+'" onclick="uf(\'pos\',\''+p+'\')">'+p+'</button>';}).join("")+'</div>';
    h+='<div style="margin-bottom:12px"><label style="font-size:10px;color:var(--dim)">MIN PPG <span style="color:var(--y);font-weight:700;float:right">'+fPPG+'</span></label><input type="range" min="0" max="25" value="'+fPPG+'" oninput="uf(\'ppg\',this.value)" style="width:100%;accent-color:var(--y)"></div>';
    h+='<div style="margin-bottom:12px"><label style="font-size:10px;color:var(--dim)">MIN RPG <span style="color:var(--y);font-weight:700;float:right">'+fRPG+'</span></label><input type="range" min="0" max="12" step="0.5" value="'+fRPG+'" oninput="uf(\'rpg\',this.value)" style="width:100%;accent-color:var(--y)"></div>';
    h+='<div style="margin-bottom:12px"><label style="font-size:10px;color:var(--dim)">MIN 3PT% <span style="color:var(--y);font-weight:700;float:right">'+f3P+'%</span></label><input type="range" min="0" max="50" value="'+f3P+'" oninput="uf(\'3p\',this.value)" style="width:100%;accent-color:var(--y)"></div></div>';
    h+='<div style="font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:8px">'+res.length+' MATCHES</div>';
    res.forEach(function(p){var ps=pStats[p.player_name]||{};
      h+='<div class="card" style="cursor:pointer" onclick="openP(\''+p.id+"','p')\">";
      h+='<div style="display:flex;justify-content:space-between"><div><div style="font-size:15px;font-weight:700">'+p.player_name+'</div><div style="display:flex;gap:6px;margin-top:3px">'+pill(p.position)+pill(p.status.toUpperCase(),sc(p.status))+'</div></div>';
      if(p.nil_estimate)h+='<div style="font-size:14px;font-weight:700;color:var(--green);font-family:Bebas Neue">$'+(p.nil_estimate/1000).toFixed(0)+'K</div>';
      h+='</div><div style="font-size:11px;color:var(--dim);margin-top:4px">'+p.current_school+'</div>';
      h+='<div style="display:flex;gap:12px;margin-top:6px">';
      if(ps.ppg)h+='<span style="font-size:13px"><b style="color:var(--y)">'+ps.ppg+'</b> ppg</span>';
      if(ps.rpg)h+='<span style="font-size:13px"><b style="color:var(--y)">'+ps.rpg+'</b> rpg</span>';
      if(ps.three_pct)h+='<span style="font-size:13px"><b style="color:var(--y)">'+(ps.three_pct*100).toFixed(1)+'%</b> 3PT</span>';
      h+='</div></div>';});
    c.innerHTML=h;
  }
}
</script>
</body>
</html>
