<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#F7F4ED">
<title>Apex Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F4ED;
  --surface:#FFFFFF;
  --surface-2:#FBFAF5;
  --surface-3:#F2EFE7;
  --ink:#0A0E1A;
  --ink-2:#525861;
  --ink-3:#8B8F97;
  --line:#E6E3DB;
  --line-2:#EFEBE0;
  --brand:#0B2540;
  --brand-ink:#FFFFFF;
  --accent:#1758E8;
  --accent-bg:#EDF2FB;
  --pos:#0D7A3B;
  --pos-bg:#E8F3EC;
  --neg:#B42318;
  --neg-bg:#FEEEEA;
  --gold:#B88A00;
  --gold-bg:#FBF2DE;
  --serif:'Fraunces', Georgia, 'Times New Roman', serif;
  --sans:'Manrope', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
.hide{display:none !important}
.serif{font-family:var(--serif);letter-spacing:-0.2px}
.num{font-variant-numeric:tabular-nums}

/* top bar */
.topbar{background:var(--surface);border-bottom:0.5px solid var(--line);padding:10px 18px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;min-height:60px}
.brand-block{display:flex;flex-direction:column;gap:1px;cursor:pointer}
.brand-name{font-family:var(--serif);font-size:18px;font-weight:500;letter-spacing:-0.3px;color:var(--brand)}
.brand-sub{font-size:11px;color:var(--ink-3)}
.hamb{width:40px;height:40px;border-radius:50%;background:var(--surface-3);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:3px;cursor:pointer;border:none}
.hamb span{width:15px;height:1.5px;background:var(--ink);border-radius:1px;display:block}

/* body */
.body{padding:16px 18px 40px;max-width:520px;margin:0 auto}

/* cards */
.card{background:var(--surface);border:0.5px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px}
.card-inset{background:var(--surface-2);border-top:0.5px solid var(--line-2);padding:14px 18px 16px;margin:12px -18px -16px}
.card-flush{background:var(--surface);border:0.5px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:12px}

/* section headers */
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;margin-top:4px}
.sec-title{font-size:14px;font-weight:600;color:var(--ink)}
.sec-link{font-size:12px;color:var(--accent);cursor:pointer;font-weight:500}

/* stat tile grid (home brief) */
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tile{background:var(--surface);border:0.5px solid var(--line);border-radius:12px;padding:12px 14px}
.tile-l{font-size:11px;color:var(--ink-2);margin-bottom:4px}
.tile-v{font-size:24px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
.tile-s{font-size:10px;color:var(--ink-3);margin-top:4px}

/* chips / pills */
.chip{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:0.2px;background:var(--surface-3);color:var(--brand)}
.chip-navy{background:var(--brand);color:var(--brand-ink)}
.chip-accent{background:var(--accent-bg);color:var(--accent)}
.chip-pos{background:var(--pos-bg);color:var(--pos)}
.chip-neg{background:var(--neg-bg);color:var(--neg)}
.chip-gold{background:var(--gold-bg);color:var(--gold)}
.chip-line{background:transparent;border:0.5px solid var(--line);color:var(--ink-2)}

/* row (list item) */
.row{padding:14px 16px;border-bottom:0.5px solid var(--line-2);display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}
.row:last-child{border-bottom:none}
.row-main{flex:1;min-width:0}
.row-name{font-size:14px;font-weight:600;margin-bottom:2px}
.row-meta{font-size:11px;color:var(--ink-2)}
.row-right{text-align:right;flex-shrink:0}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;width:100%;transition:opacity 0.15s}
.btn:active{opacity:0.85}
.btn-primary{background:var(--brand);color:var(--brand-ink)}
.btn-accent{background:var(--accent);color:#fff}
.btn-line{background:var(--surface);color:var(--ink);border:0.5px solid var(--line)}
.btn-ghost{background:transparent;color:var(--accent)}
.btn-danger{background:var(--neg);color:#fff}
.btn-sm{padding:8px 12px;font-size:12px;width:auto}

/* inputs */
.inp{width:100%;background:var(--surface);border:0.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--ink);font-family:inherit;outline:none}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
textarea.inp{resize:vertical;min-height:70px}

/* filter bar */
.fbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fb{background:var(--surface);border:0.5px solid var(--line);color:var(--ink-2);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.fb.a{background:var(--brand);color:var(--brand-ink);border-color:var(--brand)}

/* segmented control */
.seg{display:flex;gap:4px;background:var(--surface-3);padding:3px;border-radius:10px;margin-bottom:16px}
.seg-item{flex:1;text-align:center;padding:8px;font-size:13px;font-weight:500;color:var(--ink-3);border-radius:8px;cursor:pointer}
.seg-item.a{background:var(--surface);color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(10,14,26,0.06)}

/* avatar */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;color:#fff;flex-shrink:0}
.av-sm{width:22px;height:22px;font-size:9px;border:1.5px solid var(--surface)}
.av-md{width:32px;height:32px;font-size:11px}
.av-lg{width:44px;height:44px;font-size:14px}

/* drawer */
.drawer-wrap{position:fixed;inset:0;z-index:300;display:none}
.drawer-wrap.open{display:block}
.drawer-back{position:absolute;inset:0;background:rgba(10,14,26,0.48);animation:fadein 0.2s}
.drawer{position:absolute;top:0;left:0;bottom:0;width:84%;max-width:340px;background:var(--surface);display:flex;flex-direction:column;animation:slidein 0.22s ease-out}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slidein{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.drawer-head{padding:18px 22px 20px;display:flex;align-items:center;justify-content:space-between}
.drawer-close{width:32px;height:32px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;position:relative}
.drawer-close::before,.drawer-close::after{content:'';position:absolute;width:12px;height:1.5px;background:var(--ink);border-radius:1px}
.drawer-close::before{transform:rotate(45deg)}
.drawer-close::after{transform:rotate(-45deg)}
.drawer-user{margin:0 22px 24px;padding:14px;background:var(--surface-3);border-radius:12px;display:flex;align-items:center;gap:12px}
.drawer-user-name{font-size:14px;font-weight:600}
.drawer-user-sub{font-size:11px;color:var(--ink-2);margin-top:2px}
.drawer-group{padding:0 22px 6px}
.drawer-group-title{font-size:10px;color:var(--ink-3);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.drawer-item{padding:12px 14px;font-size:15px;color:var(--ink);cursor:pointer;border-radius:10px;display:flex;align-items:center;justify-content:space-between;font-weight:500}
.drawer-item.a{background:var(--surface-3);color:var(--brand);font-weight:600}
.drawer-item .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.drawer-div{height:1px;background:var(--line-2);margin:14px 22px}
.drawer-foot{padding:4px 22px 28px}
.drawer-foot-item{padding:10px 14px;font-size:14px;color:var(--ink-2);cursor:pointer}
.drawer-foot-item.danger{color:var(--neg)}
.badge{background:var(--neg);color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center}
.badge-gold{background:var(--gold);color:#fff}

/* modal */
.mbg{position:fixed;inset:0;background:rgba(10,14,26,0.42);z-index:400;overflow-y:auto;padding:0;display:flex;align-items:flex-end;justify-content:center}
.mdl{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-width:520px;padding:6px 18px 24px;max-height:92vh;overflow-y:auto;animation:slideup 0.22s ease-out}
@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.mdl-grab{width:36px;height:4px;background:var(--line);border-radius:2px;margin:8px auto 14px}
.mdl-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.mdl-title{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-0.4px;line-height:1.2}
.mdl-sub{font-size:12px;color:var(--ink-2);margin-top:2px}
.mdl-close{background:var(--surface-3);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--ink);position:relative}
.mdl-close::before,.mdl-close::after{content:'';position:absolute;top:50%;left:50%;width:12px;height:1.5px;background:var(--ink);border-radius:1px}
.mdl-close::before{transform:translate(-50%,-50%) rotate(45deg)}
.mdl-close::after{transform:translate(-50%,-50%) rotate(-45deg)}

/* player detail specific */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--surface-2);padding:10px 12px;border-radius:10px}
.stat-box .l{font-size:10px;color:var(--ink-2);font-weight:600;letter-spacing:0.3px;margin-bottom:2px}
.stat-box .v{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}

/* three-col compare (apex/market/delta) */
.trio{display:flex;gap:8px;margin-bottom:8px}
.trio-item{flex:1;padding:10px 12px;border-radius:10px}
.trio-l{font-size:9px;font-weight:600;letter-spacing:0.3px}
.trio-v{font-size:17px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px}
.trio-apex{background:var(--accent-bg);color:var(--accent)}
.trio-apex .trio-v{color:var(--brand)}
.trio-mkt{background:var(--surface-3);color:var(--ink-2)}
.trio-mkt .trio-v{color:var(--ink)}
.trio-pos{background:var(--pos-bg);color:var(--pos)}
.trio-pos .trio-v{color:var(--pos)}
.trio-neg{background:var(--neg-bg);color:var(--neg)}
.trio-neg .trio-v{color:var(--neg)}

/* progress bar */
.prog-bar{height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--brand);border-radius:3px;transition:width 0.3s}
.prog-fill.pos{background:var(--pos)}
.prog-fill.neg{background:var(--neg)}
.prog-fill.gold{background:var(--gold)}

/* login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.login-box{width:100%;max-width:360px;text-align:center}
.login-brand{font-family:var(--serif);font-size:34px;font-weight:500;letter-spacing:-0.8px;color:var(--brand);margin-bottom:6px}
.login-sub{font-size:12px;color:var(--ink-3);margin-bottom:40px;letter-spacing:0.3px}
.login-err{color:var(--neg);font-size:13px;margin-top:12px;text-align:center;min-height:16px}
.login-foot{margin-top:48px;font-size:11px;color:var(--ink-3);letter-spacing:0.3px}

/* next game hero */
.game-hero{background:var(--surface);border:0.5px solid var(--line);border-radius:14px;padding:18px}
.game-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.game-date{font-size:11px;color:var(--ink-2);font-weight:500;letter-spacing:0.2px}
.game-vs{display:flex;align-items:center;justify-content:space-between}
.game-team{flex:1}
.game-team.away{text-align:right}
.game-team-name{font-family:var(--serif);font-size:20px;font-weight:500;letter-spacing:-0.3px}
.game-team-meta{font-size:11px;color:var(--ink-3);margin-top:2px}
.game-sep{font-size:13px;color:var(--ink-3);font-weight:500;padding:0 12px}
.game-foot{margin-top:14px;padding-top:12px;border-top:0.5px solid var(--line-2);display:flex;justify-content:space-between;font-size:12px;color:var(--ink-2)}

/* materials list (visits) */
.mat-row{background:var(--surface);border:0.5px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.mat-icon{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:11px;font-weight:600;flex-shrink:0}
.mat-ppt{background:var(--neg-bg);color:var(--neg)}
.mat-pdf{background:var(--accent-bg);color:var(--accent)}
.mat-img{background:var(--pos-bg);color:var(--pos)}
.mat-doc{background:var(--gold-bg);color:var(--gold)}
.mat-main{flex:1;min-width:0}
.mat-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mat-meta{font-size:11px;color:var(--ink-3);margin-top:1px}
.mat-action{font-size:12px;color:var(--accent);font-weight:500;cursor:pointer;flex-shrink:0}
.upload-drop{border:1px dashed #C8C4B8;border-radius:10px;padding:14px;text-align:center;font-size:12px;color:var(--ink-2);font-weight:500;cursor:pointer;background:var(--surface)}
.upload-drop:active{background:var(--surface-3)}

/* toast */
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;padding:10px 20px;border-radius:10px;font-weight:500;font-size:13px;z-index:500;box-shadow:0 6px 20px rgba(0,0,0,0.2);animation:slideup 0.25s ease-out}

/* range slider */
input[type=range]{width:100%;accent-color:var(--accent);margin:6px 0}

/* select */
select.inp{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--ink-3) 50%),linear-gradient(135deg,var(--ink-3) 50%,transparent 50%);background-position:calc(100% - 20px) 50%,calc(100% - 15px) 50%;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:36px}

/* greeting */
.greet-date{font-size:11px;color:var(--ink-3);letter-spacing:0.3px;margin-bottom:3px}
.greet-line{font-family:var(--serif);font-size:26px;font-weight:500;line-height:1.15;letter-spacing:-0.5px;color:var(--ink)}

/* spacing helpers */
.mt-sm{margin-top:6px}.mt-md{margin-top:12px}.mt-lg{margin-top:20px}
.mb-sm{margin-bottom:6px}.mb-md{margin-bottom:12px}.mb-lg{margin-bottom:20px}
.empty{text-align:center;padding:40px 20px;color:var(--ink-3);font-size:13px}

/* positional tile colors for brief */
.tile-alert .tile-v{color:var(--neg)}
.tile-warn .tile-v{color:var(--gold)}
.tile-info .tile-v{color:var(--brand)}

/* builder slot */
.slot{background:var(--surface);border:0.5px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.slot-empty{border-style:dashed;color:var(--ink-3);cursor:pointer;justify-content:center;padding:16px}
.slot-l{font-size:10px;color:var(--ink-3);margin-bottom:2px;font-weight:600;letter-spacing:0.3px}
.slot-n{font-size:14px;font-weight:600}

/* scrollable full-height */
.scroll-h{max-height:60vh;overflow-y:auto}

/* news card */
.news-card{background:var(--surface);border:0.5px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:8px;cursor:pointer}
.news-src{font-size:10px;color:var(--ink-2);letter-spacing:0.4px;margin-bottom:6px;font-weight:600;text-transform:uppercase}
.news-head{font-family:var(--serif);font-size:17px;font-weight:500;line-height:1.3;letter-spacing:-0.2px;margin-bottom:6px;color:var(--ink)}
.news-sum{font-size:12px;color:var(--ink-2);line-height:1.5}

/* shortlist card */
.sl-card{background:var(--surface);border:0.5px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:8px;cursor:pointer}

/* portal movement row */
.portal-row{padding:14px 16px;border-bottom:0.5px solid var(--line-2);display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}
.portal-row:last-child{border-bottom:none}
.portal-since{font-size:10px;color:var(--gold);margin-top:2px;font-weight:500}

/* roster pulse */
.pulse-stats{display:flex;justify-content:space-between;gap:8px;margin-bottom:14px}
.pulse-l{font-size:11px;color:var(--ink-2);margin-bottom:2px}
.pulse-v{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums}

/* ai scout quick chips */
.ai-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.ai-chip{background:var(--surface);border:0.5px solid var(--line);color:var(--ink-2);padding:8px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit}
.ai-chip:active{background:var(--surface-3)}

/* visits cards */
.visit-card{background:var(--surface);border:0.5px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden}
.visit-body{padding:16px 18px 14px}
.visit-itin{padding:12px 14px;background:var(--surface-3);border-radius:10px;margin-bottom:12px}
.visit-date-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.visit-when{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.visit-in{font-size:11px;color:var(--pos);font-weight:500}
.visit-desc{font-size:12px;color:var(--ink-2);line-height:1.5}
.visit-staff{display:flex;align-items:center;gap:8px}
.visit-staff-avs{display:flex}
.visit-staff-avs .av-sm+.av-sm{margin-left:-6px}

/* mini-calendar (Visits screen) */
.mini-cal{background:var(--surface);border:0.5px solid var(--line);border-radius:14px;padding:14px 16px 16px;margin-bottom:14px}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mc-month{font-family:var(--serif);font-size:16px;font-weight:500;letter-spacing:-0.2px;color:var(--ink)}
.mc-nav{background:var(--surface-3);border:none;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--ink);font-weight:500;line-height:1;font-family:inherit}
.mc-nav:active{opacity:0.7}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mc-dow{margin-bottom:4px}
.mc-dow div{text-align:center;font-size:10px;color:var(--ink-3);font-weight:600;padding:4px 0;letter-spacing:0.3px}
.mc-pad{aspect-ratio:1}
.mc-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border-radius:50%;position:relative;color:var(--ink);transition:background 0.1s;user-select:none}
.mc-day:active{background:var(--surface-3)}
.mc-day.mc-has{font-weight:700}
.mc-day.mc-today{color:var(--accent);font-weight:700}
.mc-day.mc-sel{background:var(--brand);color:var(--brand-ink);font-weight:700}
.mc-day.mc-sel.mc-today{color:var(--brand-ink)}
.mc-dot{position:absolute;bottom:5px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
.mc-day.mc-sel .mc-dot{background:var(--brand-ink)}
.mc-clear{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--accent-bg);border:0.5px solid rgba(23,88,232,0.15);border-radius:10px;margin-bottom:14px;font-size:12px}
.mc-clear-link{color:var(--accent);font-weight:600;cursor:pointer}

/* ranking callout (On3 Consensus on cards) */
.rank-callout{background:var(--surface-2);border:0.5px solid var(--line);border-radius:10px;padding:8px 10px 9px;text-align:center;flex-shrink:0;min-width:78px}
.rank-callout .rc-l{font-size:9px;color:var(--ink-3);letter-spacing:0.3px;text-transform:uppercase;font-weight:600;margin-bottom:3px}
.rank-callout .rc-n{font-family:var(--serif);font-size:19px;font-weight:500;color:var(--brand);line-height:1;letter-spacing:-0.3px;font-variant-numeric:tabular-nums}
.rank-callout .rc-s{font-size:10px;color:var(--ink-2);font-variant-numeric:tabular-nums;margin-top:3px}

/* drawer mobile tweaks */
@media(max-width:380px){
  .body{padding:14px 14px 40px}
  .card{padding:14px 16px}
  .tile{padding:11px 13px}

   ============================================ */
window.valueNil=function(p,ps){
  var ppg=(ps&&ps.ppg)||p.ppg||0;
  var pos=p.position||"";
  var cls=p["class_year"]||"FR";
  var sc=p.competing_schools?p.competing_schools.split(",").length:0;
  var base=ppg*80000;
  var posPrem=pos==="C"?200000:pos==="PG"?100000:0;
  var yrsLeft=cls==="SR"?1:cls==="JR"?2:cls==="SO"?3:4;
  var yrsPrem=yrsLeft*150000;
  var demandPrem=sc*100000;
  var confMult=1.0;
  if(p.current_conference){
    var cn=p.current_conference.toLowerCase();
    if(cn.indexOf("big ten")>=0||cn.indexOf("sec")>=0||cn.indexOf("big 12")>=0||cn.indexOf("acc")>=0)confMult=1.0;
    else if(cn.indexOf("big east")>=0||cn.indexOf("pac")>=0||cn.indexOf("mountain")>=0||cn.indexOf("aac")>=0)confMult=0.75;
    else confMult=0.5;
  }
  var total=Math.round((base+posPrem+yrsPrem+demandPrem)*confMult);
  var lo=Math.round(total*0.75);
  var hi=Math.round(total*1.25);
  var label=total>=1500000?"Franchise":total>=800000?"Starter":total>=400000?"6th man":total>=150000?"Rotation":"Bench";
  return{mid:total,lo:lo,hi:hi,name:label,n:total>=1500000?1:total>=800000?2:total>=400000?3:total>=150000?4:5};
};
window.tier=valueNil;

window.getWeights=function(preset){

};

window.saveCommit=function(pid,slot){
  var nil=parseFloat(document.getElementById("nilAmt").value)||0;
  var alloc=budget.per_player_allocations_json||{by_position:{},by_player:{}};
  if(!alloc.by_player)alloc.by_player={};
  var existing=alloc.by_player["slot_"+slot];
  var status=existing?(existing.status||"planned"):"planned";
  alloc.by_player["slot_"+slot]={prospect_id:pid,nil:nil,slot:slot,status:status,
    offered_at:existing?existing.offered_at:null,
    accepted_at:existing?existing.accepted_at:null,
    declined_at:existing?existing.declined_at:null};
  /* Committed total = sum of ACCEPTED only */
  var acceptedTotal=0;
  Object.keys(alloc.by_player).forEach(function(k){
    var s=alloc.by_player[k];
    if((s.status||"planned")==="accepted")acceptedTotal+=(s.nil||0);
  });
  var totBudget=parseFloat(budget.total_budget)||0;
  var willBeOver=acceptedTotal>totBudget;
  api("/rest/v1/nil_budget?id=eq."+budget.id,{method:"PATCH",body:JSON.stringify({per_player_allocations_json:alloc,committed_amount:acceptedTotal}),prefer:"return=minimal"}).then(function(){
    budget.per_player_allocations_json=alloc;
    budget.committed_amount=acceptedTotal;
    budget.remaining_amount=totBudget-acceptedTotal;
    closeM();render();
    if(willBeOver){
      setTimeout(function(){
        if(confirm("Signed offers (Accepted) total "+fmt$(acceptedTotal-totBudget)+" over budget.\n\nOpen budget increase request now?")){
          openReqModal(acceptedTotal-totBudget,"Signed offers exceed current cap. Need additional NIL allocation.");
        }
      },300);
    }else{
      toast("Saved · "+(status.charAt(0).toUpperCase()+status.slice(1)));
    }
  });
};
window.changeSlotStatus=function(slot,newStatus){
  var alloc=budget.per_player_allocations_json||{};
  if(!alloc.by_player||!alloc.by_player["slot_"+slot])return;
  var s=alloc.by_player["slot_"+slot];
  s.status=newStatus;
  var ts=new Date().toISOString();
  if(newStatus==="offered")s.offered_at=ts;
  if(newStatus==="accepted")s.accepted_at=ts;
  if(newStatus==="declined")s.declined_at=ts;
  /* Recompute committed = sum of accepted */
  var acceptedTotal=0;
  Object.keys(alloc.by_player).forEach(function(k){
    var x=alloc.by_player[k];
    if((x.status||"planned")==="accepted")acceptedTotal+=(x.nil||0);
  });
  var totBudget=parseFloat(budget.total_budget)||0;
  var willBeOver=newStatus==="accepted"&&acceptedTotal>totBudget;
  api("/rest/v1/nil_budget?id=eq."+budget.id,{method:"PATCH",body:JSON.stringify({per_player_allocations_json:alloc,committed_amount:acceptedTotal}),prefer:"return=minimal"}).then(function(){
    budget.per_player_allocations_json=alloc;
    budget.committed_amount=acceptedTotal;
    budget.remaining_amount=totBudget-acceptedTotal;
    render();
    var labels={offered:"Offer extended",accepted:"Player accepted ✓",declined:"Marked declined",planned:"Reset to planned"};
    toast(labels[newStatus]||"Status updated");
    if(willBeOver){
      setTimeout(function(){
        if(confirm("Signed offers now total "+fmt$(acceptedTotal-totBudget)+" over budget.\n\nOpen budget increase request now?")){
          openReqModal(acceptedTotal-totBudget,"Signed offers exceed current cap after marking accepted. Need additional NIL allocation.");
        }

};

window.icsForVisit=function(v){
  var pad=function(n){return String(n).padStart(2,"0");};
  var fmt=function(d){return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+"T"+pad(d.getHours())+pad(d.getMinutes())+"00";};
  var fmtUtc=function(d){return d.toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"");};
  var escIcs=function(s){return (s||"").replace(/\\/g,"\\\\").replace(/\n/g,"\\n").replace(/,/g,"\\,").replace(/;/g,"\\;");};
  var staffNames=(v.staff||[]).map(function(i){return staffByInitials(i).name;}).join(", ");
  var visitDate=new Date(v.date_iso);
  var lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Apex Intel//EN","CALSCALE:GREGORIAN","METHOD:PUBLISH"];
  if(v.itinerary&&v.itinerary.length){
    v.itinerary.forEach(function(item,idx){
      var parts=item.time.split(":");
      var start=new Date(visitDate);
      start.setHours(parseInt(parts[0],10),parseInt(parts[1],10),0,0);
      var end=new Date(start.getTime()+(item.duration_min||60)*60*1000);
      var summary=item.title+" — "+v.prospect_name+(v.type==="official"?" (OV)":" (UV)");
      var desc="Part of "+(v.type==="official"?"Official":"Unofficial")+" Visit with "+v.prospect_name+". Item "+(idx+1)+" of "+v.itinerary.length+(staffNames?". Staff: "+staffNames:"");
      lines.push("BEGIN:VEVENT");
      lines.push("UID:apex-visit-"+v.id+"-"+idx+"@apexintel");
      lines.push("DTSTAMP:"+fmtUtc(new Date()));
      lines.push("DTSTART:"+fmt(start));
      lines.push("DTEND:"+fmt(end));
      lines.push("SUMMARY:"+escIcs(summary));
      if(item.location)lines.push("LOCATION:"+escIcs(item.location));
      lines.push("DESCRIPTION:"+escIcs(desc));
      lines.push("END:VEVENT");
    });
  }else{
    var start=new Date(v.date_iso);
    var end=new Date(start.getTime()+2*60*60*1000);
    var summary=(v.type==="official"?"Official Visit":"Unofficial Visit")+": "+v.prospect_name;
    var desc=(v.location||"")+(staffNames?" · Staff: "+staffNames:"");
    lines.push("BEGIN:VEVENT");
    lines.push("UID:apex-visit-"+v.id+"@apexintel");
    lines.push("DTSTAMP:"+fmtUtc(new Date()));
    lines.push("DTSTART:"+fmt(start));
    lines.push("DTEND:"+fmt(end));
    lines.push("SUMMARY:"+escIcs(summary));
    if(v.location)lines.push("LOCATION:"+escIcs(v.location));
    lines.push("DESCRIPTION:"+escIcs(desc));
    lines.push("END:VEVENT");
  }
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
};

  var _ln=coach.name?coach.name.split(" ").slice(-1)[0]:"";if(_ln.toLowerCase()==="coach")_ln="";h+='<div class="greet-line">'+greet+", Coach"+(_ln?" "+_ln:"")+'.</div>';

  h+='<div style="font-size:11px;color:var(--ink-3);margin-bottom:14px">Sum of all slots — adjust per-position allocation</div>';

  c.innerHTML=h;

window.updateAllocLive=function(pos,val){
  var v=parseFloat(val)||0;
  var alloc=budget.per_player_allocations_json||{};
  if(!alloc.by_position)alloc.by_position={};
  if(!alloc.by_position[pos])alloc.by_position[pos]={allocated:0,spent:0,notes:""};
  alloc.by_position[pos].allocated=v;
  budget.per_player_allocations_json=alloc;
  /* Sync sibling input */
  var sl=document.getElementById("alloc-sl-"+pos);
  var num=document.getElementById("alloc-num-"+pos);
  if(sl&&document.activeElement!==sl)sl.value=v;
  if(num&&document.activeElement!==num)num.value=v;
  /* Recompute total */
  var positionTotal=0;
  Object.keys(alloc.by_position).forEach(function(k){positionTotal+=parseFloat(alloc.by_position[k].allocated)||0;});
  var tot=parseFloat(budget.total_budget);
  var posOver=positionTotal>tot;
  var posOverBy=posOver?(positionTotal-tot):0;
  /* Update Allocated tile */
  var tileV=document.getElementById("allocTileV");
  var tileS=document.getElementById("allocTileS");
  var tile=document.getElementById("allocTile");
  if(tileV)tileV.textContent=fmt$(positionTotal);
  if(tileS)tileS.textContent=(tot>0?(positionTotal/tot*100).toFixed(0):0)+"% of cap"+(posOver?" · over":"");
  if(tile){if(posOver)tile.classList.add("tile-alert");else tile.classList.remove("tile-alert");}
  /* Update over-budget alert */
  var alert=document.getElementById("posOverAlert");
  var alertMain=document.getElementById("posOverMain");
  var alertBtn=document.getElementById("posOverBtn");
  if(alert){
    alert.style.display=posOver?"flex":"none";
    if(posOver&&alertMain)alertMain.textContent="Allocated "+fmt$(positionTotal)+" · "+fmt$(posOverBy)+" over "+fmt$(tot)+" cap";
    if(posOver&&alertBtn)alertBtn.textContent="Request +"+fmt$(posOverBy);
  }
};

window.reqOverBudget=function(){
  var alloc=budget.per_player_allocations_json||{};
  var positionTotal=0;
  Object.keys(alloc.by_position||{}).forEach(function(k){positionTotal+=parseFloat(alloc.by_position[k].allocated)||0;});
  var tot=parseFloat(budget.total_budget);
  var overBy=Math.max(0,positionTotal-tot);
  openReqModal(overBy,"Position allocations total "+fmt$(positionTotal)+" against current "+fmt$(tot)+" cap. Need additional NIL allocation across positions to support tier-appropriate offers.");
};

window.saveAllocs=function(){

    toast("Allocations saved");

};

  var alloc=(budget&&budget.per_player_allocations_json)||{by_player:{}};
  var byPlayer=alloc.by_player||{};
  var allP={};prospects.forEach(function(p){allP[p.id]=p;});roster.forEach(function(p){allP[p.id]=p;});
  var tot=parseFloat(budget&&budget.total_budget)||10000000;

  /* Compute status totals */
  var planned=0,offered=0,accepted=0,declinedSum=0;
  var pCount=0,oCount=0,aCount=0,dCount=0;
  Object.keys(byPlayer).forEach(function(k){
    var s=byPlayer[k];
    var amt=s.nil||0;
    var status=s.status||"planned";
    if(status==="planned"){planned+=amt;pCount++;}
    else if(status==="offered"){offered+=amt;oCount++;}
    else if(status==="accepted"){accepted+=amt;aCount++;}
    else if(status==="declined"){declinedSum+=amt;dCount++;}
  });
  var totalActive=pCount+oCount+aCount;
  var critical=accepted>tot;
  var warning=!critical&&(accepted+offered)>tot;
  var info=!critical&&!warning&&(accepted+offered+planned)>tot;
  var criticalOver=accepted-tot;
  var warningOver=(accepted+offered)-tot;
  var infoOver=(accepted+offered+planned)-tot;

  var h='';

  /* 3-level alert */
  if(critical){
    h+='<div style="background:rgba(220,38,38,0.1);border:0.5px solid rgba(220,38,38,0.45);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px">';
    h+='<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:var(--neg);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:3px">🔴 Critical · over cap on signed offers</div>';
    h+='<div style="font-size:13px;color:var(--ink);font-weight:600">'+fmt$(accepted)+' in accepted offers · '+fmt$(criticalOver)+' over '+fmt$(tot)+' cap</div>';
    h+='<div style="font-size:11px;color:var(--ink-2);margin-top:2px">Immediate AD action required — contracts already signed</div></div>';
    h+='<button class="btn btn-primary btn-sm" style="background:var(--neg);width:auto;padding:8px 14px;flex-shrink:0" onclick="openReqModal('+criticalOver+',\'CRITICAL: Signed offers exceed cap. Immediate increase needed to honor existing commitments.\')">Request +'+fmt$(criticalOver)+'</button>';
    h+='</div>';
  }else if(warning){
    h+='<div style="background:rgba(184,138,0,0.1);border:0.5px solid rgba(184,138,0,0.4);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px">';
    h+='<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:3px">🟠 Warning · risk if all offers land</div>';
    h+='<div style="font-size:13px;color:var(--ink);font-weight:600">'+fmt$(accepted+offered)+' if all offers accept · '+fmt$(warningOver)+' over '+fmt$(tot)+' cap</div>';
    h+='<div style="font-size:11px;color:var(--ink-2);margin-top:2px">Consider trimming offers or queueing a budget increase</div></div>';
    h+='<button class="btn btn-primary btn-sm" style="background:var(--gold);width:auto;padding:8px 14px;flex-shrink:0" onclick="openReqModal('+warningOver+',\'Outstanding offers at risk of exceeding cap if all accepted. Pre-approving increase to maintain flexibility.\')">Request +'+fmt$(warningOver)+'</button>';
    h+='</div>';
  }else if(info){
    h+='<div style="background:rgba(23,88,232,0.06);border:0.5px solid rgba(23,88,232,0.25);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:12px">';
    h+='<div style="flex:1;min-width:0"><div style="font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:2px">🟡 FYI · scenario over cap</div>';
    h+='<div style="font-size:12px;color:var(--ink-2)">Full scenario including planning is '+fmt$(infoOver)+' over the '+fmt$(tot)+' cap</div></div>';
    h+='</div>';
  }

  /* 4-tile grid */
  h+='<div class="tile-grid mb-md" style="grid-template-columns:repeat(4,1fr)">';
  h+='<div class="tile"><div class="tile-l">Filled</div><div class="tile-v">'+totalActive+'/18</div><div class="tile-s">slots'+(dCount?" · "+dCount+" decl":"")+'</div></div>';
  h+='<div class="tile '+(critical?"tile-alert":"")+'" style="'+(aCount?"background:rgba(34,197,94,0.06)":"")+'"><div class="tile-l">Committed</div><div class="tile-v">'+fmt$(accepted)+'</div><div class="tile-s">'+aCount+' signed</div></div>';
  h+='<div class="tile" style="'+(oCount?"background:rgba(184,138,0,0.06)":"")+'"><div class="tile-l">Offered</div><div class="tile-v">'+fmt$(offered)+'</div><div class="tile-s">'+oCount+' outstanding</div></div>';
  h+='<div class="tile"><div class="tile-l">Planned</div><div class="tile-v">'+fmt$(planned)+'</div><div class="tile-s">'+pCount+' scenario</div></div>';
  h+='</div>';

  /* Filter chips */
  h+='<div class="fbar" style="margin-bottom:14px">';
  [["all","All"],["planned","Planned · "+pCount],["offered","Offered · "+oCount],["accepted","Accepted · "+aCount],["declined","Declined · "+dCount]].forEach(function(opt){
    h+='<button class="fb'+(bldStatus===opt[0]?" a":"")+'" onclick="bldStatus=\''+opt[0]+'\';render()">'+opt[1]+'</button>';
  });
  h+='</div>';

  /* Slot rows — section headers shown only in "all" mode */
  if(bldStatus==="all"){h+='<div style="font-size:12px;color:var(--ink-2);font-weight:600;margin-bottom:8px">NIL roster · slots 1–13</div>';}
  for(var i=1;i<=13;i++){
    var slotData=byPlayer["slot_"+i];
    if(bldStatus==="all"||(slotData&&(slotData.status||"planned")===bldStatus)){
      h+=slotHTML(i,byPlayer,allP,false);
    }
  }
  if(bldStatus==="all"){h+='<div style="font-size:12px;color:var(--ink-2);font-weight:600;margin:16px 0 8px">Depth / walk-on · slots 14–18</div>';}
  for(var j=14;j<=18;j++){
    var slotDataD=byPlayer["slot_"+j];
    if(bldStatus==="all"||(slotDataD&&(slotDataD.status||"planned")===bldStatus)){
      h+=slotHTML(j,byPlayer,allP,true);
    }
  }
  c.innerHTML=h;
};
window.slotHTML=function(i,byPlayer,allP,small){
  var slot=byPlayer["slot_"+i];
  if(slot){
    var p=allP[slot.prospect_id]||{player_name:"Unknown"};
    var status=slot.status||"planned";
    var statusLabels={planned:"PLANNED",offered:"OFFERED",accepted:"ACCEPTED",declined:"DECLINED"};
    var statusChips={planned:"chip-line",offered:"chip-gold",accepted:"chip-pos",declined:"chip-neg"};
    var bg=status==="declined"?"var(--surface-2)":status==="accepted"?"rgba(34,197,94,0.04)":status==="offered"?"rgba(184,138,0,0.04)":"";
    var op=status==="declined"?"0.7":"1";
    var html='<div class="slot" style="display:block;padding:14px 16px;cursor:pointer'+(bg?";background:"+bg:"")+';opacity:'+op+'" onclick="openNilEditExisting('+i+')">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px">';
    html+='<div style="flex:1;min-width:0"><div class="slot-l" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">Slot '+i+' · '+fmt$(slot.nil||0)+' <span class="chip '+statusChips[status]+'" style="font-size:9px;padding:2px 7px;font-weight:700">'+statusLabels[status]+'</span></div>';
    html+='<div class="slot-n" style="margin-top:2px">'+esc(p.player_name)+'</div></div>';
    html+='</div>';
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">';
    if(status==="planned"){
      html+='<button class="btn btn-primary btn-sm" style="padding:6px 12px;width:auto;font-size:11px" onclick="event.stopPropagation();markOffered('+i+')">Make offer →</button>';
    }else if(status==="offered"){
      html+='<button class="btn btn-line btn-sm" style="padding:6px 10px;width:auto;font-size:11px;color:var(--neg);border-color:var(--neg)" onclick="event.stopPropagation();markDeclined('+i+')">Decline</button>';
      html+='<button class="btn btn-primary btn-sm" style="background:var(--pos);padding:6px 12px;width:auto;font-size:11px" onclick="event.stopPropagation();markAccepted('+i+')">Mark accepted ✓</button>';
    }
    html+='<button class="btn btn-line btn-sm" style="padding:6px 10px;width:auto;font-size:11px;color:var(--ink-3);border-color:var(--line)" onclick="event.stopPropagation();removeSlot('+i+')">Remove</button>';
    html+='</div></div>';
    return html;
  }
  return '<div class="slot slot-empty" onclick="openSlot('+i+')">+ Slot '+i+' · tap to add</div>';
};

window.renderScout=function(c){

  h+='</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:10px">';
  h+='<input id="aiInput" class="inp" style="flex:1;margin:0" placeholder="'+(aiMode==="llm"?"Ask anything or tap mic...":"e.g., Find me a PG shooter under $1M")+'" value="'+esc(aiQuery||"")+'">';

    var answer=aiResults.llmAnswer||"";

      if(!p.player_name||seen[p.id])return;
      var escaped=p.player_name.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");

      return true;

    if(aiSortBy==="rank"){
      filteredPicks.sort(function(a,b){return(a.on3_consensus_rank||9999)-(b.on3_consensus_rank||9999);});
    }else if(aiSortBy==="nil_asc"){
      filteredPicks.sort(function(a,b){return(a.nil_estimate||0)-(b.nil_estimate||0);});
    }else if(aiSortBy==="nil_desc"){
      filteredPicks.sort(function(a,b){return(b.nil_estimate||0)-(a.nil_estimate||0);});

    h+='<div class="card"><div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:8px">Apex AI response · '+picks.length+' player'+(picks.length===1?"":"s")+' identified</div>';
    h+='<div style="font-size:11px;color:var(--ink-3)">Query: "'+esc(aiResults.query)+'"</div></div>';

      h+='<div class="card" style="padding:12px 14px">';

      h+='<div style="font-size:10px;color:var(--ink-3);margin-bottom:6px;font-weight:500">Source</div>';

      [["ALL","All · "+picks.length],["PORTAL","Portal · "+portalCount],["HS","HS · "+hsCount]].forEach(function(opt){
        h+='<button class="fb'+(aiFilterSrc===opt[0]?" a":"")+'" onclick="aiFilterSrc=\''+opt[0]+'\';render()">'+opt[1]+'</button>';
      });
      h+='</div>';
      h+='<div style="font-size:10px;color:var(--ink-3);margin-bottom:6px;font-weight:500">Sort by</div>';
      h+='<select class="inp" style="margin:0;font-size:12px;padding:8px 10px" onchange="aiSortBy=this.value;render()">';
      [["match","Match order (AI's ranking)"],["rank","On3 Rank (best first)"],["nil_asc","NIL (cheapest first)"],["nil_desc","NIL (highest first)"]].forEach(function(opt){

      if(ps.bpg)h+='<span style="font-size:11px"><b style="color:var(--brand)">'+ps.bpg+'</b> bpg</span>';

      h+='</div></div>';
    });

    h+='<div class="card" style="background:var(--surface-2)"><div style="font-size:10px;color:var(--ink-3);font-weight:700;letter-spacing:0.4px;text-transform:uppercase;margin-bottom:10px">AI Reasoning</div>';
    h+='<div style="font-size:13px;color:var(--ink);line-height:1.7;white-space:pre-wrap">'+esc(answer).replace(/\*\*(.*?)\*\*/g,'<b style="color:var(--brand)">$1</b>')+'</div></div>';
  }else if(aiResults){

      h+='<div style="text-align:right"><div style="font-size:14px;font-weight:600;color:var(--brand);font-variant-numeric:tabular-nums">'+fmt$(mv)+'</div><div style="font-size:10px;color:'+(delta>=0?"var(--pos)":"var(--neg)")+'">'+(delta>=0?"+":"−")+fmt$(Math.abs(delta))+' vs mkt</div></div></div>';
      if(ps.ppg||ps.rpg||ps.three_pct){
        h+='<div style="display:flex;gap:12px;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--line-2)">';
        if(ps.ppg)h+='<span style="font-size:11px"><b style="color:var(--brand)">'+ps.ppg+'</b> ppg</span>';
        if(ps.rpg)h+='<span style="font-size:11px"><b style="color:var(--brand)">'+ps.rpg+'</b> rpg</span>';
        if(ps.three_pct)h+='<span style="font-size:11px"><b style="color:var(--brand)">'+(ps.three_pct*100).toFixed(0)+'%</b> 3PT</span>';
        h+='</div>';
      }
      h+='</div>';
    });
  }

  c.innerHTML=h;
};
